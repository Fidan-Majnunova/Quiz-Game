<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz game</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!--Proqramin iki esas windowsu var, quize baslamazdan evvel, birde sonra -->
    <div class="container">
        <div class="active-screen" id="start-screeen">
          <h1>Quiz Time!</h1>
          <p1>Test your knowledge with these fun questions</p1>
          <button id="quiz-str">Start Quiz</button>
        </div>

        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Question goes here</h2> 
                <div class="quiz-info">
                    <p> 
                        Question <span id="current-question">1</span>
                    </p>
                </div>

            </div>



        </div>
       


    </div>
    
</body>
</html>
